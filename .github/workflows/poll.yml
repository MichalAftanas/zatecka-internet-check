name: Poll FortiGate Emails

on:
  workflow_dispatch:  # emergency manual recovery via GitHub UI (polling now handled by Cloudflare Worker cron)

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit & push data changes

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Poll Gmail for new FortiGate events
        id: poll
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: |
          python scripts/poll.py && echo "new_data=true" >> $GITHUB_OUTPUT || echo "new_data=false" >> $GITHUB_OUTPUT

      - name: Commit new data
        if: steps.poll.outputs.new_data == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: ingest new FortiGate events [skip ci]"
          git push

      # No deploy step. The dashboard is served from reports.itrinity.com/internal/
      # zatecka-internet-check/ (Worker + private R2, Google sign-in) and fetches
      # data/*.json straight from this repo's GitHub raw URLs, so committing the data
      # above IS the update: nothing needs publishing.
      #
      # The old step here ran `wrangler pages deploy . --project-name
      # zatecka-internet-check`. That Pages project does not exist (verified
      # 2026-07-15: the personal account has only itrinity, plachteni, myaquarium),
      # so the step could only fail, or worse have wrangler CREATE the project and
      # publish an UNGATED public copy of the dashboard. Removed 2026-07-15.
