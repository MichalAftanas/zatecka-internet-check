name = "zatecka-check-now"
main = "index.js"
compatibility_date = "2024-01-01"
# Pinned to the personal-gmail Cloudflare account (this worker lives there, not itrinity),
# so `wrangler deploy` targets the right account explicitly.
account_id = "c99cc016d12ed9a666d4e2c3f90c58cc"

# every 6h (was */5): each run writes 1-2 KV keys; 4 runs/day stays far under the free-tier 1k writes/day cap
[triggers]
crons = ["0 */6 * * *"]

[[kv_namespaces]]
binding = "KV"
id = "620ec9cab32e4efd8391c6704cd673e0"
